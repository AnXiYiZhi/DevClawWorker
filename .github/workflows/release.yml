name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload to R2
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}".TrimStart('v')
          $file = "src-tauri/target/release/bundle/nsis/*.exe"
          $exe = Get-ChildItem $file | Select-Object -First 1
          curl -X POST "https://devclaw.ccwu.cc/api/upload/windows?version=$version" `
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" `
            -H "Content-Type: application/octet-stream" `
            --data-binary "@$($exe.FullName)"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload to R2
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          curl -X POST "https://devclaw.ccwu.cc/api/upload/macos?version=${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${DMG}"

  update-version:
    name: Update Version
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update download page version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/const VERSION = \".*\"/const VERSION = \"${VERSION}\"/" apps/worker/src/routes/downloads.ts

      - name: Deploy Worker
        run: |
          npm install -g wrangler
          cd apps/worker
          npm install
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
